name: Build PingTest

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: pingTest-windows-x86_64.exe
            packages: gcc-mingw-w64-x86-64 mingw-w64-tools binutils-mingw-w64
            format: exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: pingTest-linux-x86_64
            packages: ""
            format: deb
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: pingTest-linux-aarch64
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            format: deb
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          REF="${REF#refs/heads/}"
          echo "VERSION=${REF}" >> $GITHUB_ENV
          echo "BUILD_NAME=pingTest-${REF}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.packages != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.packages }}

      - name: Install Tauri CLI
        run: |
          cargo install tauri-cli --version "^2"

      - name: Install fpm (for .deb)
        if: matrix.format == 'deb'
        run: |
          sudo apt-get install -y -qq ruby ruby-dev rubygems build-essential
          sudo gem install fpm --no-document

      - name: Build Tauri
        run: |
          set -e
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            export WINDRES=x86_64-w64-mingw32-windres
          fi
          cargo tauri build --target ${{ matrix.target }}
          echo "=== Build done ==="
          ls -la src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe 2>/dev/null || true
          ls -la src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi 2>/dev/null || true

      - name: Package .exe
        if: matrix.format == 'exe'
        run: |
          mkdir -p dist
          # Find the built .exe (Tauri outputs to bundle/nsis or bundle/msi)
          if ls src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe 2>/dev/null; then
            cp src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/${{ matrix.name }}
          elif ls src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi 2>/dev/null; then
            cp src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi dist/${{ matrix.name }}.msi
          fi
          # Also copy the raw binary
          if [ -f "src-tauri/target/${{ matrix.target }}/release/pingTest.exe" ]; then
            cp src-tauri/target/${{ matrix.target }}/release/pingTest.exe dist/${{ matrix.name }}
          fi
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: false
